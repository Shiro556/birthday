<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Ayel! - 19 Years</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <div class="bear-icon">
            <img src="https://png.pngtree.com/png-clipart/20241111/original/pngtree-cute-teddy-png-image_16898395.png" alt="Beruang Lucu">
        </div>
        
        <h1>🎉 Happy 19th Birthday! 🎂</h1>
        <h2>Untuk: Ayel ❤️</h2>
        <p class="date">10 Agustus 2026</p>

        <div class="cake-wrapper">
            <img src="https://png.pngtree.com/png-clipart/20230914/original/pngtree-birthday-cake-clipart-vector-image-of-birthday-cake-with-berries-and-png-image_11091197.png" alt="Kue Ulang Tahun">
        </div>

        <button class="btn" onclick="bukaSurat()">Klik dari Amiy ✨</button>
    </div>

    <div id="pop-up-surat" class="popup-overlay">
        <div class="popup-content">
            <span class="close-btn" onclick="tutupSurat()">&times;</span>
            <div class="card-flap"></div>
            <div class="popup-inner-content">
                <h3>Surat Spesial dari Amiy 💌</h3>
                <p>"HAPPY BIRTHDAYY YAAA"</p>
                <p>Semoga apapun yang ingin jadi tujuanmu tercapai, sehat selalu, panjang umur, dan jangan bandel yaaa"</p>
                <div class="decor-icons">🎈🧸✨</div>
            </div>
        </div>
    </div>

    <audio id="lagu" src="birthday.mp3" loop></audio>

    <script>
        function bukaSurat() {
            document.getElementById("pop-up-surat").style.display = "flex";
            
            var audio = document.getElementById("lagu");
            if (audio) {
                audio.play().then(function() {
                    console.log("Musik sukses diputar di localhost!");
                }).catch(function(error) {
                    console.log("Autoplay diblokir browser, memicu alert.");
                    alert("Klik 'OK' ya biar musik ulang tahunnya kedengeran! 🎵✨");
                    audio.play();
                });
            }

            document.querySelectorAll('.balloon').forEach(b => b.remove());
            for (let i = 0; i < 35; i++) {
                let balloon = document.createElement('div');
                balloon.className = 'balloon';
                balloon.style.left = Math.random() * 100 + 'vw';
                balloon.style.animationDelay = (Math.random() * 2) + 's';
                balloon.style.backgroundColor = `hsl(${Math.random() * 360}, 85%, 65%)`;
                document.body.appendChild(balloon);
                
                setTimeout(() => balloon.remove(), 6000);
            }
        }

        function tutupSurat() {
            document.getElementById("pop-up-surat").style.display = "none";
            document.querySelectorAll('.balloon').forEach(b => b.remove());
        }
    </script>
</body>
</html>
